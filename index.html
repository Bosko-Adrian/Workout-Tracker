<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f0f11" />
  <link rel="apple-touch-icon" href="icon.svg" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header>
      <h1>Workout Tracker</h1>
      <span id="session-timer" class="hidden"></span>
    </header>

    <!-- Tab Nav -->
    <nav class="tab-bar">
      <button class="tab active" data-tab="log">Log</button>
      <button class="tab" data-tab="history">History</button>
      <button class="tab" data-tab="stats">Stats</button>
    </nav>

    <!-- LOG TAB -->
    <section id="tab-log" class="tab-content active">
      <div id="no-session">
        <div id="start-options">
          <p class="hint">No active workout.</p>
          <button id="start-workout-btn" class="btn-primary big">Start Workout</button>
          <button id="log-past-btn" class="btn-secondary big">Log Past Workout</button>
        </div>
        <div id="type-picker" class="hidden">
          <p class="type-picker-label">What type of session?</p>
          <div class="type-chips">
            <button class="type-chip" data-type="Push">Push</button>
            <button class="type-chip" data-type="Pull">Pull</button>
            <button class="type-chip" data-type="Legs">Legs</button>
            <button class="type-chip" data-type="Upper">Upper</button>
            <button class="type-chip" data-type="Lower">Lower</button>
            <button class="type-chip" data-type="Cardio">Cardio</button>
            <button class="type-chip" data-type="Mobility">Mobility</button>
          </div>
          <button id="skip-type-btn" class="btn-ghost">Skip</button>
        </div>
      </div>

      <div id="active-session" class="hidden">
        <div id="session-info-bar"></div>

        <div id="manual-date-row" class="hidden">
          <label for="manual-date-input">Workout date</label>
          <input id="manual-date-input" type="date" />
          <label>Duration (optional)</label>
          <div class="duration-inputs">
            <input id="manual-hours-input" type="number" min="0" max="23" placeholder="0" /> <span>h</span>
            <input id="manual-mins-input" type="number" min="0" max="59" placeholder="0" /> <span>m</span>
          </div>
        </div>

        <div id="exercise-list"></div>

        <button id="add-exercise-btn" class="btn-secondary">+ Add Exercise</button>

        <div class="session-actions">
          <button id="finish-workout-btn" class="btn-primary">Save Workout</button>
          <button id="discard-workout-btn" class="btn-danger">Discard</button>
        </div>
      </div>
    </section>

    <!-- HISTORY TAB -->
    <section id="tab-history" class="tab-content hidden">
      <div id="history-list">
        <p class="hint">No workouts logged yet.</p>
      </div>
    </section>

    <!-- STATS TAB -->
    <section id="tab-stats" class="tab-content hidden">
      <div class="stats-header">
        <label for="stats-exercise-select">Exercise</label>
        <select id="stats-exercise-select">
          <option value="">-- pick an exercise --</option>
        </select>
      </div>
      <div id="stats-content">
        <p class="hint">Select an exercise to see your progress.</p>
      </div>
    </section>
  </div>

  <!-- EDIT WORKOUT MODAL -->
  <div id="edit-modal-overlay" class="hidden">
    <div id="edit-modal">
      <div class="edit-modal-header">
        <h2>Edit Workout</h2>
        <button id="edit-modal-close-btn" class="btn-ghost">✕</button>
      </div>

      <div class="edit-section">
        <label for="edit-date-input">Date</label>
        <input id="edit-date-input" type="date" />
      </div>

      <div class="edit-section">
        <label>Session type</label>
        <div class="type-chips edit-type-chips">
          <button class="type-chip edit-type-chip" data-type="Push">Push</button>
          <button class="type-chip edit-type-chip" data-type="Pull">Pull</button>
          <button class="type-chip edit-type-chip" data-type="Legs">Legs</button>
          <button class="type-chip edit-type-chip" data-type="Upper">Upper</button>
          <button class="type-chip edit-type-chip" data-type="Lower">Lower</button>
          <button class="type-chip edit-type-chip" data-type="Cardio">Cardio</button>
          <button class="type-chip edit-type-chip" data-type="Mobility">Mobility</button>
        </div>
      </div>

      <div class="edit-section">
        <label>Duration (optional)</label>
        <div class="duration-inputs">
          <input id="edit-hours-input" type="number" min="0" max="23" placeholder="0" /> <span>h</span>
          <input id="edit-mins-input" type="number" min="0" max="59" placeholder="0" /> <span>m</span>
        </div>
      </div>

      <div class="edit-section">
        <label>Exercises</label>
        <div id="edit-exercise-list"></div>
        <button id="edit-add-exercise-btn" class="btn-secondary" style="width:100%;margin-top:8px">+ Add Exercise</button>
      </div>

      <div class="modal-actions">
        <button id="edit-cancel-btn" class="btn-secondary">Cancel</button>
        <button id="edit-save-btn" class="btn-primary">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- ADD EXERCISE MODAL -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <h2>Add Exercise</h2>
      <label for="exercise-name-input">Exercise name</label>
      <input id="exercise-name-input" type="text" placeholder="e.g. Bench Press" autocomplete="off" list="exercise-suggestions" />
      <datalist id="exercise-suggestions"></datalist>
      <div class="modal-actions">
        <button id="modal-cancel-btn" class="btn-secondary">Cancel</button>
        <button id="modal-add-btn" class="btn-primary">Add</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
